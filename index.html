<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature and Humidity</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">
    <div class="container mx-auto p-4 flex-grow">
        <h1 class="text-4xl font-extrabold text-center mb-6 text-gray-700">Temperature and Humidity Dashboard</h1>
        <p class="text-center text-gray-500 mb-8">Stay updated with real-time environmental data</p>

        <div class="flex justify-center mb-6">
            <button id="toggleMode" class="px-6 py-3 bg-blue-500 text-white rounded-lg shadow-lg hover:bg-blue-600">Switch to Graph Mode</button>
        </div>

        <div id="numericalMode" class="text-center">
            <div class="bg-white bg-opacity-70 backdrop-blur-md rounded-lg p-6 shadow-md">
                <p class="text-2xl font-semibold text-gray-700">Temperature: <span id="temperature">--</span></p>
                <p class="text-2xl font-semibold text-gray-700">Humidity: <span id="humidity">--</span></p>
            </div>
        </div>

        <div id="graphMode" class="hidden">
            <div class="bg-white bg-opacity-70 backdrop-blur-md rounded-lg p-6 shadow-md">
                <canvas id="dataChart"></canvas>
            </div>
        </div>

        <footer class="text-center text-gray-500 py-4">
            <p>Powered by Code Architect | 6 compton close </p>
        </footer>
    </div>
</body>
</html>
